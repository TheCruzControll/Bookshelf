name: agent-rebaser
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to rebase (optional; rebases all open agent PRs if empty)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # On push to main: serialize by ref so multiple rapid merges don't race.
  # On per-PR triggers: serialize by PR number.
  group: rebaser-${{ github.event.pull_request.number || inputs.pr_number || 'global' }}
  cancel-in-progress: false

jobs:
  rebase:
    # Skip pull_request triggers unless the PR is from an agent OR was labeled
    # with merge-conflict (retry path). Push events always run.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       (startsWith(github.event.pull_request.head.ref, 'agent/') ||
        github.event.label.name == 'merge-conflict'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}
          fetch-depth: 0
      - name: Enable corepack (pins pnpm via packageManager field)
        run: corepack enable
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run rebaser
        run: pnpm --filter @hone/orchestrator-tools rebaser
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          AUTO_RESOLVABLE_FILES: "pnpm-lock.yaml"
