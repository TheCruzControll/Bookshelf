name: agent-reviewer
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Trigger when (a) the PR title matches the Implementer pattern `[#NN] ...`,
    # (b) the PR is from one of the bot accounts, or (c) the PR carries
    # `agent:reviewer`. Since BOT_PAT is owned by a real user, Implementer PRs
    # show that user as author rather than a bot, so the title regex is the
    # primary filter. Doc PRs always carry the label, so they hit (c).
    if: |
      startsWith(github.event.pull_request.title, '[#') ||
      startsWith(github.event.pull_request.title, 'docs: updates from #') ||
      contains(github.event.pull_request.labels.*.name, 'agent:reviewer') ||
      github.event.pull_request.user.login == 'hone-implementer[bot]' ||
      github.event.pull_request.user.login == 'hone-documenter[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Post pickup comment on PR
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "🤖 **Reviewer started** (Haiku 4.5)

          Run: $RUN_URL

          The Reviewer will either approve (auto-merge can fire) or request changes (Implementer re-runs via the bounce-back loop)." \
            -R "$REPO" || true
      - name: Read prompt
        id: prompt
        run: |
          {
            echo 'PROMPT<<EOF_PROMPT'
            cat tools/orchestrator/prompts/reviewer.md
            echo
            echo "EOF_PROMPT"
          } >> "$GITHUB_OUTPUT"
      - uses: anthropics/claude-code-base-action@beta
        with:
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-haiku-4-5
          allowed_tools: "Bash,Read,Glob,Grep"
          timeout_minutes: 15
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
