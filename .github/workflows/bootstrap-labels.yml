name: bootstrap-labels
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tools/orchestrator/labels.json"
      - ".github/workflows/bootstrap-labels.yml"

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync labels from tools/orchestrator/labels.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const labels = JSON.parse(fs.readFileSync('tools/orchestrator/labels.json', 'utf8'));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
                await github.rest.issues.updateLabel({
                  owner, repo,
                  name: label.name,
                  color: label.color,
                  description: label.description ?? '',
                });
                core.info(`Updated ${label.name}`);
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo,
                    name: label.name,
                    color: label.color,
                    description: label.description ?? '',
                  });
                  core.info(`Created ${label.name}`);
                } else {
                  throw e;
                }
              }
            }
