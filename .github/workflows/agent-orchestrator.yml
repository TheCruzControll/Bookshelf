name: agent-orchestrator
on:
  schedule:
    - cron: "*/15 * * * *"
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  pull_request:
    types: [closed, labeled, unlabeled]
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read
  actions: write

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Enable corepack (pins pnpm via packageManager field)
        run: corepack enable
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run orchestrator
        run: pnpm --filter @hone/orchestrator-tools orchestrator
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_PR_MERGED: ${{ github.event.pull_request.merged }}
          MAX_CONCURRENT_IMPLEMENTERS: "3"
          IMPLEMENTER_WORKFLOW: agent-implementer.yml
          IMPLEMENTER_REF: main
