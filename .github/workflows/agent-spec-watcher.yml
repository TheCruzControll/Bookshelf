name: agent-spec-watcher
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to derive new issues from (optional)"
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: spec-watcher-${{ github.event.pull_request.number || inputs.pr_number || 'manual' }}
  cancel-in-progress: false

jobs:
  watch:
    # Fire on merged doc PRs that aren't from the spec-watcher itself or the
    # documenter (those produce noise loops). Always fire on manual dispatch.
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'type:doc') &&
       !startsWith(github.event.pull_request.title, 'docs: updates from #') &&
       !startsWith(github.event.pull_request.title, 'spec: '))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read prompt
        id: prompt
        run: |
          {
            echo 'PROMPT<<EOF_PROMPT'
            cat tools/orchestrator/prompts/spec-watcher.md
            echo
            echo "EOF_PROMPT"
          } >> "$GITHUB_OUTPUT"
      - uses: anthropics/claude-code-base-action@beta
        with:
          prompt: ${{ steps.prompt.outputs.PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-haiku-4-5
          allowed_tools: "Bash,Read,Glob,Grep"
          timeout_minutes: 12
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          TRIGGER: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
