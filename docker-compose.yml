services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hone
      POSTGRES_PASSWORD: hone
      POSTGRES_DB: hone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hone"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
